# Redrob Hackathon — Submission Metadata
#

# ============================================================================
# Team identity
# ============================================================================
team_name: "team_redrob_solver"  # Used in leaderboard and announcements

primary_contact:
  name: "Redrob Solver"
  email: "solver@example.com"   # Used for all organizer communication
  phone: "+91-9999999999"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Redrob Solver"
    email: "solver@example.com"
    role: "ML Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/solver/redrob-challenge"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3.

sandbox_link: "https://huggingface.co/spaces/solver/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample.

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows 11 PC"
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false
  has_network_during_ranking: false             # Must be false
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini to analyze honeypot candidate distributions and implement the two-stage ranking pipeline in Python.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-stage candidate ranking pipeline running end-to-end on CPU in ~30 seconds.
  Stage 1 filters out 65 honeypots (impossible durations, 0-dur skills, YOE mismatches) and unrelated roles (HR/Marketing Managers), selecting the top 2,000 using a fast title/skills/YOE heuristic.
  Stage 2 scores the top 2,000 based on title relevance, specific ML skills (embeddings, vector search, RAG), experience, product company history, logistics (notice, location), and applies a multiplicative behavioral signal multiplier (recruiter response rate, activity recency, and github contributions).
  Final top 100 are selected, ties are broken alphabetically, and factual, candidate-specific reasonings are generated.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # Checked for honeypots
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
